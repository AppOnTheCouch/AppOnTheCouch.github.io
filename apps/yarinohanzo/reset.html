<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yari No Hanzo - Restablecer contraseña</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background-color: #0d0d0d;
    color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .card {
    background-color: #161616;
    border: 1px solid #c0392b;
    border-radius: 12px;
    padding: 40px 30px;
    max-width: 420px;
    width: 90%;
    text-align: center;
    box-shadow: 0 0 30px rgba(192, 57, 43, 0.25);
  }
  .logo {
    max-width: 260px;
    width: 100%;
    height: auto;
    margin-bottom: 24px;
  }
  h1 {
    font-size: 20px;
    margin: 0 0 12px;
    color: #ffffff;
  }
  p {
    font-size: 15px;
    line-height: 1.5;
    color: #cccccc;
    margin: 0 0 28px;
  }
  button {
    background-color: #c0392b;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    padding: 14px 28px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
  }
  button:active {
    background-color: #a93226;
  }
  .error {
    color: #ff6b6b;
    font-size: 14px;
    margin-top: 20px;
    display: none;
  }
</style>
</head>
<body>
  <div class="card">
    <img src="logo_YNH.png" alt="Yari No Hanzo" class="logo">
    <h1>Restablecer contraseña</h1>
    <p>Pulsa el botón para continuar con el restablecimiento de tu contraseña en la app Yari No Hanzo.</p>
    <button id="resetBtn" onclick="goToReset()">Restablecer contraseña</button>
    <p class="error" id="errorMsg">Enlace no válido o incompleto. Solicita un nuevo restablecimiento de contraseña desde la app.</p>
  </div>

<script>
  const SUPABASE_DOMAIN = "https://gqotnghgmlfjvnakkowp.supabase.co";

  function getParam(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
  }

  function goToReset() {
    const token = getParam("token");
    const type = getParam("type") || "recovery";
    const redirectTo = getParam("redirect_to") || "io.yarinohanzo://reset-callback";

    if (!token) {
      document.getElementById("errorMsg").style.display = "block";
      document.getElementById("resetBtn").style.display = "none";
      return;
    }

    const verifyUrl = SUPABASE_DOMAIN + "/auth/v1/verify?token=" + encodeURIComponent(token)
      + "&type=" + encodeURIComponent(type)
      + "&redirect_to=" + encodeURIComponent(redirectTo);

    window.location.href = verifyUrl;
  }
</script>
</body>
</html>
